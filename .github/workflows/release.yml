name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: macos-15
    permissions:
      contents: write
    env:
      SCHEME: JustNow
      CONFIGURATION: Release
      DERIVED_DATA_PATH: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare build compatibility flags for hosted runner
        run: |
          SDK_VERSION="$(xcrun --sdk macosx --show-sdk-version)"
          SDK_MAJOR="${SDK_VERSION%%.*}"
          echo "macOS SDK version: ${SDK_VERSION}"
          if [ "${SDK_MAJOR}" -lt 26 ]; then
            echo "LEGACY_MACOS_UI=1" >> "${GITHUB_ENV}"
            echo "LEGACY_OTHER_SWIFT_FLAGS=-DLEGACY_MACOS_UI -disable-upcoming-feature StrictConcurrency -strict-concurrency=minimal" >> "${GITHUB_ENV}"
            echo "LEGACY_SWIFT_STRICT_CONCURRENCY=minimal" >> "${GITHUB_ENV}"
            echo "LEGACY_SWIFT_VERSION=5" >> "${GITHUB_ENV}"
            echo "Detected SDK < 26: applying compatibility build flags."
          else
            echo "Detected SDK >= 26: using primary API path."
          fi

      - name: Install DMG tooling
        run: |
          brew install create-dmg

      - name: Validate release signing secrets
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_SIGNING_CERTIFICATE_P12: ${{ secrets.APPLE_SIGNING_CERTIFICATE_P12 }}
          APPLE_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_SIGNING_CERTIFICATE_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_ISSUER_ID: ${{ secrets.APPLE_API_KEY_ISSUER_ID }}
        run: |
          if [ -z "${APPLE_TEAM_ID}" ] || [ -z "${APPLE_SIGNING_IDENTITY}" ] || [ -z "${APPLE_SIGNING_CERTIFICATE_P12}" ] || [ -z "${APPLE_SIGNING_CERTIFICATE_PASSWORD}" ] || [ -z "${APPLE_KEYCHAIN_PASSWORD}" ] || [ -z "${APPLE_API_KEY}" ] || [ -z "${APPLE_API_KEY_ID}" ] || [ -z "${APPLE_API_KEY_ISSUER_ID}" ]; then
            echo "::error::Release signing secrets are not fully configured for this repository."
            echo "Set APPLE_TEAM_ID, APPLE_SIGNING_IDENTITY, APPLE_SIGNING_CERTIFICATE_P12, APPLE_SIGNING_CERTIFICATE_PASSWORD, APPLE_KEYCHAIN_PASSWORD, APPLE_API_KEY, APPLE_API_KEY_ID, and APPLE_API_KEY_ISSUER_ID."
            exit 1
          fi

      - name: Import signing certificate
        env:
          APPLE_SIGNING_CERTIFICATE_P12: ${{ secrets.APPLE_SIGNING_CERTIFICATE_P12 }}
          APPLE_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_SIGNING_CERTIFICATE_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="${RUNNER_TEMP}/justnow-release.keychain-db"
          CERT_PATH="${RUNNER_TEMP}/apple_distribution.p12"

          security create-keychain -p "${APPLE_KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${APPLE_KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"

          echo "${APPLE_SIGNING_CERTIFICATE_P12}" | base64 --decode > "${CERT_PATH}"
          security import "${CERT_PATH}" -P "${APPLE_SIGNING_CERTIFICATE_PASSWORD}" -A -t cert -f pkcs12 -k "${KEYCHAIN_PATH}"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${APPLE_KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"

          security list-keychains -d user -s "${KEYCHAIN_PATH}"
          security default-keychain -s "${KEYCHAIN_PATH}"

      - name: Build app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          python3 -m pip install --user --quiet pillow
          ./Scripts/generate-appicon-icns.sh

          xcodebuild \
            -scheme "${SCHEME}" \
            -configuration "${CONFIGURATION}" \
            -derivedDataPath "${DERIVED_DATA_PATH}" \
            ${LEGACY_OTHER_SWIFT_FLAGS:+OTHER_SWIFT_FLAGS="${LEGACY_OTHER_SWIFT_FLAGS}"} \
            ${LEGACY_SWIFT_STRICT_CONCURRENCY:+SWIFT_STRICT_CONCURRENCY="${LEGACY_SWIFT_STRICT_CONCURRENCY}"} \
            ${LEGACY_SWIFT_VERSION:+SWIFT_VERSION="${LEGACY_SWIFT_VERSION}"} \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package release artifacts
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_ISSUER_ID: ${{ secrets.APPLE_API_KEY_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          mkdir -p dist
          APP_NAME="${SCHEME}"
          APP_PATH="${DERIVED_DATA_PATH}/Build/Products/${CONFIGURATION}/${APP_NAME}.app"
          VERSION="${GITHUB_REF_NAME}"
          ZIP_PATH="dist/${APP_NAME}-${VERSION}-macos.zip"
          DMG_PATH="dist/${APP_NAME}-${VERSION}-macos.dmg"
          STAGING_DIR="dist/staging"
          BG_PATH="${GITHUB_WORKSPACE}/Assets/Release/dmg-background.png"
          ENTITLEMENTS_PATH="${GITHUB_WORKSPACE}/Scripts/distribution-entitlements.plist"
          API_KEY_FILE="${RUNNER_TEMP}/apple_api_key.p8"
          echo "${APPLE_API_KEY}" | base64 --decode > "${API_KEY_FILE}"

          rm -f "${ZIP_PATH}" "${DMG_PATH}"

          codesign --force --options runtime --timestamp --entitlements "${ENTITLEMENTS_PATH}" --sign "${APPLE_SIGNING_IDENTITY}" "${APP_PATH}/Contents/MacOS/JustNow"
          codesign --force --options runtime --timestamp --deep --sign "${APPLE_SIGNING_IDENTITY}" "${APP_PATH}"
          codesign --verify --deep --strict --verbose=2 "${APP_PATH}"

          mkdir -p "${STAGING_DIR}"
          rm -rf "${STAGING_DIR:?}"/*
          cp -R "${APP_PATH}" "${STAGING_DIR}/"

          ditto -c -k --sequesterRsrc --keepParent "${APP_PATH}" "${ZIP_PATH}"

          if [ -f "${BG_PATH}" ]; then
            create-dmg \
              --window-pos 200 120 \
              --window-size 560 360 \
              --icon-size 120 \
              --text-size 12 \
              --icon "${APP_NAME}.app" 160 190 \
              --app-drop-link 390 190 \
              --hide-extension "${APP_NAME}.app" \
              --no-internet-enable \
              --volname "${APP_NAME}" \
              --background "${BG_PATH}" \
              "${DMG_PATH}" \
              "${STAGING_DIR}/"
          else
            create-dmg \
              --window-pos 200 120 \
              --window-size 560 360 \
              --icon-size 120 \
              --text-size 12 \
              --icon "${APP_NAME}.app" 160 190 \
              --app-drop-link 390 190 \
              --hide-extension "${APP_NAME}.app" \
              --no-internet-enable \
              --volname "${APP_NAME}" \
              "${DMG_PATH}" \
              "${STAGING_DIR}/"
          fi

          codesign --force --options runtime --timestamp --sign "${APPLE_SIGNING_IDENTITY}" "${DMG_PATH}"
          codesign --verify --strict --verbose=2 "${DMG_PATH}"

          xcrun notarytool submit "${DMG_PATH}" \
            --key "${API_KEY_FILE}" \
            --key-id "${APPLE_API_KEY_ID}" \
            --issuer "${APPLE_API_KEY_ISSUER_ID}" \
            --team-id "${APPLE_TEAM_ID}" \
            --wait
          xcrun stapler staple "${DMG_PATH}"
          xcrun stapler validate "${DMG_PATH}"

          rm -rf "${STAGING_DIR}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/JustNow-${{ github.ref_name }}-macos.zip
            dist/JustNow-${{ github.ref_name }}-macos.dmg

      - name: Cleanup signing keychain
        if: always()
        run: |
          security delete-keychain "${RUNNER_TEMP}/justnow-release.keychain-db"
